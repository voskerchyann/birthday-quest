</head>

    </form>

    <form action="game2.html">
        <button type="submit">ԽԱՂ 2</button>
    </form>

    <form action="game3.html">
        <button type="submit">ԽԱՂ 3</button>
    </form>

    <form action="chemuzum.html" id="skipBtn">
        <button type="submit" style="background-color: red;position: absolute; top:360px;right: 650px">Դու ինձ չասես ես ինչ անեմ այ տԸղա</button>
    </form>

</div>

</html>
